<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 待办清单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>我的待办清单</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="输入新任务..." />
            <label class="priority-label">
                <input type="checkbox" id="priorityInput" />
                <span>重要</span>
            </label>
            <button id="addBtn">添加</button>
        </div>

        <div class="footer-section">
            <button id="clearAllBtn" class="clear-btn">清空全部</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        // 获取 DOM 元素
        const taskInput = document.getElementById('taskInput');
        const priorityInput = document.getElementById('priorityInput');
        const addBtn = document.getElementById('addBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const taskList = document.getElementById('taskList');

        // 从本地存储加载任务
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        // 初始化渲染
        renderTasks();

        // 添加按钮点击事件
        addBtn.addEventListener('click', addTask);

        // 输入框回车事件
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // 清空全部按钮事件
        clearAllBtn.addEventListener('click', () => {
            if (tasks.length === 0) return;
            if (confirm('确定要清空所有任务吗？')) {
                tasks = [];
                saveTasks();
                renderTasks();
            }
        });

        // 格式化日期时间
        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // 添加任务
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            const task = {
                id: Date.now(),
                text: text,
                completed: false,
                important: priorityInput.checked,
                createdAt: Date.now()
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            taskInput.value = '';
            priorityInput.checked = false;
        }

        // 切换完成状态
        function toggleTask(id) {
            tasks = tasks.map(task =>
                task.id === id ? { ...task, completed: !task.completed } : task
            );
            saveTasks();
            renderTasks();
        }

        // 切换重要状态
        function togglePriority(id, event) {
            event.stopPropagation();
            tasks = tasks.map(task =>
                task.id === id ? { ...task, important: !task.important } : task
            );
            saveTasks();
            renderTasks();
        }

        // 删除任务
        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            renderTasks();
        }

        // 保存到本地存储
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // 渲染任务列表
        function renderTasks() {
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty">暂无任务，添加一个吧！</li>';
                return;
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''} ${task.important ? 'important' : ''}`;

                const createdTime = task.createdAt ? formatDateTime(task.createdAt) : '';
                const priorityTag = task.important
                    ? `<span class="priority-tag" onclick="togglePriority(${task.id}, event)">重要</span>`
                    : `<span class="priority-tag normal" onclick="togglePriority(${task.id}, event)">普通</span>`;

                li.innerHTML = `
                    <div class="task-content" onclick="toggleTask(${task.id})">
                        <div class="task-header">
                            ${priorityTag}
                            <span class="task-text">${task.text}</span>
                        </div>
                        <span class="task-time">${createdTime}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">删除</button>
                `;

                taskList.appendChild(li);
            });
        }
    </script>
</body>
</html>
